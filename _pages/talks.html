{% assign sorted_talks = site.talks | sort: "date" | reverse %}

{% for talk in sorted_talks %}
<p>
  <strong>{{ talk.type }}</strong> — 
  {{ talk.title }}. 
  <em>{{ talk.venue }}</em>, {{ talk.location }} 
  ({{ talk.date | date: "%Y" }}).
</p>
{% endfor %}
